name: Qodana

on:
  pull_request:

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2026.1
        with:
          args: |
            --linter qodana-jvm-community
            --within-docker false
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
